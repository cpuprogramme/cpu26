
	<style>

		article.banner-article {
			padding : 1em ;
			background-color: red;


			& .encloser {
				display : flex;
				flex-direction: row;
			}

			& img.illustration {
				width : 200px;
				height : 200px;
			}
		}
	</style>

<article id="p{{tpl:EntryID}}" class="post {{tpl:EntryIfOdd}} {{tpl:EntryIfFirst}} full banner-article" role="article">


	<a class="encloser" href="{{tpl:EntryURL}}">

		<img class="illustration" src="{{tpl:EntryFirstImage with_category="1" no_tag="1" size="o"}}" alt="" />

		<div>
			<p>
				<span class="not-small">Précédente émission </span>diffusée le <time datetime="{{tpl:EntryDate iso8601="1"}}">{{tpl:EntryDate}}</time>
				<tpl:EntrySeries>
					<span class="not-small">dans la série «&nbsp;<em>{{tpl:SerieID}}</em>&nbsp;»</span>
				</tpl:EntrySeries>
			</p>

			<h3 class="post-title verybig">{{tpl:EntryTitle encode_html="1"}}</h3>

			<p class="post-meta not-small">

				<tpl:EntryTags>
					<tpl:TagsHeader>
						thèmes : 
						<ul class="post-tags-list">
					</tpl:TagsHeader>
						<li class="post-tags-item"><a href="{{tpl:TagURL}}">{{tpl:TagID}}</a></li>
					<tpl:TagsFooter>
						</ul>
					</tpl:TagsFooter>
				</tpl:EntryTags>

			</p>
		</div>

	</a>
	<tpl:EntryIf operator="or" show_comments="1" show_pings="1" has_attachment="1">
		<tpl:Attachments>
			<tpl:AttachmentIf is_mp3="1">
				{{tpl:include src="_mp3_player_chapters.html"}}
			</tpl:AttachmentIf>
		</tpl:Attachments>
	</tpl:EntryIf>


</article>
