<!-- Template non utilisé -->
<article id="p{{tpl:EntryID}}" class="post {{tpl:EntryIfOdd}} {{tpl:EntryIfFirst}} full banner-article" role="article">

	<div class="encloser" href="{{tpl:EntryURL}}">

	<!-- style="background-image:url({{tpl:EntryFirstImage with_category="1" no_tag="1" size="o"}})" --> 

		<div class="post-meta">
			<p>
			diffusé le <time datetime="{{tpl:EntryDate iso8601="1"}}">{{tpl:EntryDate}}</time>
			</p>
			<tpl:EntrySeries>
				<p>Dans <a href="{{tpl:SerieURL}}">la série «&nbsp;<em>{{tpl:SerieID}}</em>&nbsp;»</a></p>
			</tpl:EntrySeries>
		</div>

		<h3 class="post-title verybig"><a href="{{tpl:EntryURL}}">{{tpl:EntryTitle encode_html="1"}}</a></h3>

		<div class="post-meta">

			<tpl:EntryTags>
				<tpl:TagsHeader>
					<p>thèmes :
					<ul class="post-tags-list">
				</tpl:TagsHeader>
					<li class="post-tags-item"><a href="{{tpl:TagURL}}">{{tpl:TagID}}</a></li>
				<tpl:TagsFooter>
					</ul>
					</p>
				</tpl:TagsFooter>
			</tpl:EntryTags>

		</div>
	</div>

	<tpl:EntryIf operator="or" show_comments="1" show_pings="1" has_attachment="1">
		<p class="post-info-co">
		<tpl:Attachments>
			<tpl:AttachmentIf is_mp3="1">
				{{tpl:include src="_mp3_player.html"}}
			</tpl:AttachmentIf>
		</tpl:Attachments>

		</p>
	</tpl:EntryIf>

</article>
