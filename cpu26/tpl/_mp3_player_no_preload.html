<cpu-audio title="{{tpl:EntryTitle}}" canonical="{{tpl:EntryURL}}" poster="{{tpl:EntryFirstImage with_category="1" no_tag="1" size="s"}}" waveform="{{tpl:WaveformFile}}" <tpl:HasWaveformFile>waveform="{{tpl:WaveformFile}}"</tpl:HasWaveformFile> playlist="cpu" hide="panels-except-play panels-title poster">
	<audio controls="controls" style="width:100%" id="sonore-{{tpl:EntryID}}" preload="none">
		<tpl:HasHlsFile>
			<source src="{{tpl:HlsFile}}" type="application/x-mpegurl" />
		</tpl:HasHlsFile>
		<tpl:HasOggfFile>
			<source src="{{tpl:OggFile}}" type="audio/ogg; codecs=vorbis" />
		</tpl:HasOggfFile>
		<source src="{{tpl:MP3File}}" type="audio/mpeg" data-downloadable />
		<tpl:HasChapterfFile>
			<track kind="chapters" src="{{tpl:ChapterFile}}" default />
		</tpl:HasChapterfFile>
	</audio>
</cpu-audio>
