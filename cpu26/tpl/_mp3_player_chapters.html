<cpu-audio 
	title="{{tpl:EntryTitle}}"
	canonical="{{tpl:EntryURL}}"
	poster="{{tpl:EntryFirstImage with_category="1" no_tag="1" size="s"}}"
	<tpl:HasWaveformFile>waveform="{{tpl:WaveformFile}}"</tpl:HasWaveformFile> playlist="cpu" hide="panels-title poster" glow>
	<audio controls="controls" style="width:100%" id="sonore-{{tpl:EntryID}}">
		<tpl:HasHlsFile>
			<source src="{{tpl:HlsFile}}" type="application/x-mpegurl" />
		</tpl:HasHlsFile>
		<tpl:HasOggFile>
			<source src="{{tpl:OggFile}}" type="audio/ogg; codecs=vorbis" />
		</tpl:HasOggFile>
		<source src="{{tpl:MP3File}}" type="audio/mpeg" data-downloadable />
		<tpl:HasChapterFile>
			<track kind="chapters" src="{{tpl:ChapterFile}}" default />
		</tpl:HasChapterFile>
	</audio>
</cpu-audio>
